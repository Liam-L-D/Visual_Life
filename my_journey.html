<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="js/modal.js" defer></script>
</head>

<body>
  <div class="site-wrapper">
    <div class="container">
      <header>
        <nav class="responsive-nav" aria-label="Main Navigation">
          <div class="d-flex justify-content-between align-items-center flex-wrap">
            <div class="logo-container d-flex align-items-center">
              <a href="index.html">
                <img src="imgs/FaviconLogo.png" alt="Site Logo" class="logo" />
              </a>
            </div>
            <ul class="d-flex flex-wrap list-unstyled m-0 p-0">
              <li class="mx-2"><a href="index.html">Home</a></li>
              <li class="mx-2"><a href="my_journey.html">My Journey</a></li>
              <li class="mx-2"><a href="timeline.html">Timeline</a></li>
              <li class="mx-2"><a href="my_major.html">My Major</a></li>
            </ul>
          </div>
        </nav>
      </header>

      <main>
        <h1>11,000 Miles: A New Beginning</h1>
        <section id="journey">
          <div class="image-container">
            <img src="imgs/China-1.png" alt="China" class="clickable-map" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="setModalImage('imgs/China-2.png','YUEYANG, HUNAN in CHINA')" />
            <img src="imgs/MOVE HOUSE.png" alt="Moving Journey" class="moving-img" />
            <img src="imgs/USA-1.png" alt="USA" class="clickable-map" data-bs-toggle="modal" data-bs-target="#imageModal" onclick="setModalImage('imgs/USA-2.png','ALBANY, NEW YORK in the USA')" />
          </div>

          <!-- Modal -->
          <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
              <div class="modal-content">
                <div class="modal-body">
                  <img id="modalImage" src="" alt="Large view" class="img-fluid" />
                  <p id="modalDescription" class="text-muted"></p>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <footer>

    </footer>
