<body>
  <div class="site-wrapper">
    <div class="container">
      <header>
        <nav class="responsive-nav" aria-label="Main Navigation">
          <div class="d-flex justify-content-between align-items-center flex-wrap">
            <div class="logo-container d-flex align-items-center">
              <a href="index.html">
                <img src="imgs/FaviconLogo.png" alt="Site Logo" class="logo" />
              </a>
            </div>
            <ul class="d-flex flex-wrap list-unstyled m-0 p-0">
              <li class="mx-2"><a href="index.html">Home</a></li>
              <li class="mx-2"><a href="my_journey.html">My Journey</a></li>

      <main>
        <h1>Milestones of My Journey</h1>
        <div class="timeline-container">
          <div class="timeline-item">
            <div class="timeline-icon">
              <a href="https://www.northcolonie.org/shaker-high-school/" target="_blank">
                <img src="imgs/shaker-high-logo.png" alt="Shaker High School Logo" />
              </a>
            </div>
            <div class="timeline-content">
              <h3>2013 - Shaker High School</h3>
            </div>
          </div>

          <div class="timeline-item">
            <div class="timeline-icon">
              <a href="https://www.hvcc.edu/" target="_blank">
                <img src="imgs/hvcc.jpg" alt="Hudson Valley Community College Logo" />
              </a>
            </div>
            <div class="timeline-content">
              <h3>2016 - Hudson Valley Community College</h3>
            </div>
          </div>

          <div class="timeline-item">
            <div class="timeline-icon">
              <a href="https://www.cobleskill.edu/" target="_blank">
                <img src="imgs/SUNY_Cobleskill.jpg" alt="SUNY Cobleskill Logo" />
              </a>
            </div>
            <div class="timeline-content">
              <h3>2022 - SUNY Cobleskill</h3>
            </div>
          </div>

          <div class="timeline-item">
            <div class="timeline-icon">
              <img src="imgs/5.jpeg" alt="Wedding" data-bs-toggle="modal" data-bs-target="#weddingModal" />
            </div>
            <div class="timeline-content">
              <h3>2024 - Marriage</h3>
            </div>
          </div>

          <div class="timeline-item">
            <div class="timeline-icon">
              <a href="https://sunypoly.edu/" target="_blank">
                <img src="imgs/sunypoly.jpg" alt="SUNY Polytechnic Institute Logo" />
              </a>
            </div>
            <div class="timeline-content">
              <h3>2024 - SUNY Poly</h3>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Wedding Modal -->
    <div class="modal fade" id="weddingModal" tabindex="-1" aria-labelledby="weddingModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="weddingModalLabel">Our Memories</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div id="weddingCarousel" class="carousel slide" data-bs-ride="carousel">
              <div class="carousel-inner">
                <div class="carousel-item active">
                  <img src="imgs/1.jpeg" class="d-block w-100" alt="Wedding Photo 1" />
                </div>
                <div class="carousel-item">
                  <img src="imgs/2.jpeg" class="d-block w-100" alt="Wedding Photo 2" />
                </div>
                <div class="carousel-item">
                  <img src="imgs/3.jpeg" class="d-block w-100" alt="Wedding Photo 3" />
                </div>
                <div class="carousel-item">
                  <img src="imgs/4.jpeg" class="d-block w-100" alt="Wedding Photo 4" />
                </div>
              </div>
              <button class="carousel-control-prev" type="button" data-bs-target="#weddingCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
              </button>
              <button class="carousel-control-next" type="button" data-bs-target="#weddingCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
              </button>
            </div>
          </div>
        </div>
